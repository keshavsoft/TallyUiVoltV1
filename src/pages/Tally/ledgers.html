<!DOCTYPE html>
<html lang="en">

<head>
    {{> _head title="Page Visits" path="../.."}}

    <style>
        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>

<body>
    {{> Tally/_nav title="Page Visits" path="../.."}}
    {{> Tally/_sidenavV1 title="Page Visits" isNotDatatables=true path="../.."}}

    <main class="content">
        {{> Tally/_topbar title="Page Visits"}}

        <div class="row mt-4">
            <div class="col-12 mb-4">
                <div class="card border-0 shadow">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col">
                                <h2 class="fs-5 fw-bold mb-0">All Ledgers</h2>
                            </div>
                            <div class="col text-end">
                                <a id="ledgerCountBtn" href="#" class="btn btn-sm btn-primary">See all</a>
                            </div>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table align-items-center table-flush">
                            <thead class="thead-light">
                                <tr>
                                    <th class="border-bottom" scope="col"></th>
                                    <th class="border-bottom" scope="col">#</th>
                                    <th class="border-bottom" scope="col">Ledger Name</th>
                                    <th class="border-bottom" scope="col">ParentName</th>
                                    <th class="border-bottom" scope="col">LedgerType</th>
                                </tr>
                            </thead>
                            <tbody id="visits-container">
                                <!-- Content generated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <template id="visit-template">
            <tr>
                <td class="fw-bolder text-gray-500 border-bottom visible-number"></td>
                <td class="fw-bolder text-gray-500 border-bottom row-number"></td>
                <td class="fw-bolder text-gray-900 border-bottom page-name">
                </td>
                <td class="fw-bolder text-gray-500 border-bottom page-views">
                </td>
                <td class="fw-bolder text-gray-500 border-bottom page-value">
                </td>
            </tr>
        </template>
    </main>

    <script src="../../assets/Tally/Js/Ledgers/entryFile.js" type="module"></script>
</body>

</html>
