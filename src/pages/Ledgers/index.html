<!DOCTYPE html>
<html lang="en">

<head>
    {{> _head title="Team Members"}}
</head>

<body>
    {{> Ledgers/_nav title="Team Members"}}
    {{> Ledgers/_sidenavV1 title="Team Members"}}

    <main class="content">
        {{> Ledgers/_topbar title="Team Members"}}

        <div class="row mt-4">
            <div class="col-12 col-xxl-6 mb-4">
                <div class="card border-0 shadow">
                    <div class="card-header border-bottom d-flex align-items-center justify-content-between">
                        <h2 class="fs-5 fw-bold mb-0">Ledger Parent Names
                            <span id="TotalGroupsCount" class="text-primary fw-bold small"></span>
                        </h2>
                        <a id="TotalLedgersBtn" href="#" class="btn btn-sm btn-primary">See all</a>
                    </div>
                    <div class="card-body">
                        <ul id="listContainer" class="list-group list-group-flush list my--3"></ul>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <template id="listTemplate">
        <li class="list-group-item px-0">
            <div class="row align-items-center">
                <div class="col-auto">
                    <a href="#" class="avatar">
                        <img class="rounded item-image" alt="Image">
                    </a>
                </div>
                <div class="col-auto ms--2">
                    <h4 class="h6 mb-0">
                        <a href="#" class="item-title"></a>
                    </h4>
                    <div class="d-flex align-items-center">
                        <div class="dot rounded-circle me-1 item-status-dot"></div>
                        <small class="item-status-text"></small>
                    </div>
                </div>
                <div class="col text-end item-action"></div>
            </div>
        </li>
    </template>

    <script src="../../assets/Ledgers/Js/Index/entryFile.js" type="module"></script>
</body>

</html>
